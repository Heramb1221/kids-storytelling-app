{% extends "base.html" %}
{% block title %}Sign Up — Storytime Stars{% endblock %}
{% block content %}
<div class="topbar">
  <div class="brand"><span class="brand-mark">✨📖</span> Storytime Stars</div>
</div>

<div class="form-shell">
  <div class="card-form">
    <a class="back-link" href="/">&larr; Back</a>
    <span class="role-tag">{{ "🍎 Teacher" if role == "teacher" else "🌙 Student" }}</span>
    <h1>Create your account</h1>

    <form id="signupForm">
      <div class="field">
        <label for="name">Your Name</label>
        <input type="text" id="name" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="new-password" minlength="4" required>
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" autocomplete="new-password" minlength="4" required>
      </div>
      <div class="form-error" id="formError"></div>
      <button type="submit" class="btn btn-block {{ 'btn-gold' if role == 'teacher' else 'btn-coral' }}" id="submitBtn">Sign Up</button>
    </form>

    <div class="switch-line">
      Already have an account? <a href="/login/{{ role }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const role = "{{ role }}";
  const form = document.getElementById("signupForm");
  const errorBox = document.getElementById("formError");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.textContent = "";

    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirmPassword").value;
    if (password !== confirm) {
      errorBox.textContent = "Passwords don't match.";
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Creating account...";

    try {
      const data = await apiCall("/signup", {
        method: "POST",
        body: {
          name: document.getElementById("name").value,
          username: document.getElementById("username").value,
          password: password,
          role: role,
        },
      });
      Auth.save(data);
      window.location.href = role === "teacher" ? "/teacher/dashboard" : "/student/dashboard";
    } catch (err) {
      errorBox.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = "Sign Up";
    }
  });
</script>
{% endblock %}
