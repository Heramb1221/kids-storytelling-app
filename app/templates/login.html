{% extends "base.html" %}
{% block title %}Log In — Storytime Stars{% endblock %}
{% block content %}
<div class="topbar">
  <div class="brand"><span class="brand-mark">✨📖</span> Storytime Stars</div>
</div>

<div class="form-shell">
  <div class="card-form">
    <a class="back-link" href="/">&larr; Back</a>
    <span class="role-tag">{{ "🍎 Teacher" if role == "teacher" else "🌙 Student" }}</span>
    <h1>Welcome back!</h1>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="form-error" id="formError"></div>
      <button type="submit" class="btn btn-block {{ 'btn-gold' if role == 'teacher' else 'btn-coral' }}" id="submitBtn">Log In</button>
    </form>

    <div class="switch-line">
      New here? <a href="/signup/{{ role }}">Create an account</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const role = "{{ role }}";
  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("formError");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.textContent = "";
    submitBtn.disabled = true;
    submitBtn.textContent = "Logging in...";

    try {
      const data = await apiCall("/login", {
        method: "POST",
        body: {
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
          role: role,
        },
      });
      Auth.save(data);
      window.location.href = role === "teacher" ? "/teacher/dashboard" : "/student/dashboard";
    } catch (err) {
      errorBox.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = "Log In";
    }
  });
</script>
{% endblock %}
